<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — مندوبية سلطة الانتخابات</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Cairo', sans-serif; }
  body {
    background: linear-gradient(135deg, #0d2137 0%, #1a5276 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: #fff;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-logo {
    background: linear-gradient(135deg, #1a5276, #2980b9);
    border-radius: 50%;
    width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
    color: white;
  }
  .form-control { border-radius: 10px; padding: 12px; }
  .btn-login { background: linear-gradient(135deg, #1a5276, #2980b9); border: none; padding: 12px; font-size: 16px; font-weight: 600; border-radius: 10px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">🗳️</div>
  <h4 class="text-center fw-bold mb-1">مندوبية سلطة الانتخابات</h4>
  <p class="text-center text-muted mb-4" style="font-size:14px;">نظام إدارة الأفراد</p>

  {% if form.errors %}
    <div class="alert alert-danger py-2" style="font-size:14px;">
      <i class="bi bi-exclamation-circle me-1"></i>
      اسم المستخدم أو كلمة المرور غير صحيحة.
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-bold">اسم المستخدم</label>
      <input type="text" name="username" class="form-control" placeholder="أدخل اسم المستخدم" autofocus required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-bold">كلمة المرور</label>
      <input type="password" name="password" class="form-control" placeholder="أدخل كلمة المرور" required>
    </div>
    <button type="submit" class="btn btn-login text-white w-100">
      تسجيل الدخول
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
