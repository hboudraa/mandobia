{% extends 'base.html' %}
{% block title %}تأكيد الحذف{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <h5 class="mb-0"><i class="bi bi-exclamation-triangle-fill me-2"></i>تأكيد الحذف</h5>
      </div>
      <div class="card-body text-center py-5">
        <i class="bi bi-person-x-fill text-danger" style="font-size:60px;"></i>
        <h4 class="mt-3">هل أنت متأكد من حذف هذا الشخص؟</h4>
        <p class="text-muted">
          <strong>{{ personne.get_full_name }}</strong> — {{ personne.get_categorie_display }}<br>
          NIN: <code>{{ personne.nin }}</code>
        </p>
        <p class="text-danger fw-bold">لا يمكن التراجع عن هذا الإجراء!</p>
        <div class="d-flex justify-content-center gap-3 mt-4">
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-5">
              <i class="bi bi-trash me-1"></i> نعم، حذف
            </button>
          </form>
          <a href="{% url 'detail_personne' personne.pk %}" class="btn btn-outline-secondary px-5">
            <i class="bi bi-x-lg me-1"></i> إلغاء
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
